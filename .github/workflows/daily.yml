name: Portfolio Agent Daily Run

on:
  schedule:
    - cron: '0 0 * * 1-5'   # 평일 매일 오전 9시 KST (UTC 00:00)
  workflow_dispatch:          # 수동 실행 버튼 (테스트용)

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run portfolio agent
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: smtp.gmail.com
          SMTP_USER: yonhongso@gmail.com
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          mkdir -p data logs
          python - <<'EOF'
import os, sys
from collector import Collector
from classifier_groq import Classifier
from dispatcher import Dispatcher, save_dashboard

collector  = Collector()
classifier = Classifier()
dispatcher = Dispatcher()

print("[1/3] 기사 수집 시작...")
articles = collector.run()
print(f"[1/3] 수집 완료: {len(articles)}건")

print("[2/3] 분류 시작...")
signals = classifier.run(articles)
print(f"[2/3] 분류 완료: {len(signals)}건")

print("[3/3] 대시보드 생성 및 텔레그램 발송...")
save_dashboard(signals)
dispatcher.send_daily(signals)
print("[3/3] 완료!")
EOF

      - name: Commit updated dashboard
        run: |
          git config user.name "Portfolio Agent Bot"
          git config user.email "action@github.com"
          git add dashboard.html
          git diff --staged --quiet || git commit -m "dashboard: auto-update $(date +'%Y-%m-%d %H:%M KST')"
          git push
