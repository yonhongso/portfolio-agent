name: Portfolio Agent Daily Run

on:
  schedule:
    - cron: '0 23 * * *'    # 매일 오전 8시 KST (UTC 23:00 전날, 주말 포함)
    - cron: '0 8 * * *'      # 매일 17:00 KST (토·일 포함) — Daily 갱신, 일요일엔 Weekly 탭 생성
    - cron: '0 0 1 * *'      # 매월 1일 09:00 KST — Monthly 탭 생성 (전월 반영)
  workflow_dispatch:          # 수동 실행 버튼 (테스트용)

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run portfolio agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: smtp.gmail.com
          SMTP_USER: yonhongso@gmail.com
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          mkdir -p data logs
          python -u run_agent.py

      - name: Seed historical signals (first run only)
        run: python seed_signals.py

      - name: Commit updated dashboard and signals
        run: |
          git config user.name "Portfolio Agent Bot"
          git config user.email "action@github.com"
          git add dashboard.html
          git add -f data/signals_*.json 2>/dev/null || true
          git add -f signals.db 2>/dev/null || true
          git diff --staged --quiet || git commit -m "dashboard: auto-update $(TZ=Asia/Seoul date +'%Y-%m-%d %H:%M KST')"
          git push
