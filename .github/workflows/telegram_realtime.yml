name: Portfolio Agent Telegram Realtime Alert

on:
  schedule:
    # KST 0시~22시 2시간 간격 (12회) — UTC 기준
    - cron: '0 15 * * *'  # 00:00 KST
    - cron: '0 17 * * *'  # 02:00 KST
    - cron: '0 19 * * *'  # 04:00 KST
    - cron: '0 21 * * *'  # 06:00 KST
    - cron: '0 23 * * *'  # 08:00 KST
    - cron: '0 1 * * *'   # 10:00 KST
    - cron: '0 3 * * *'   # 12:00 KST
    - cron: '0 5 * * *'   # 14:00 KST
    - cron: '0 7 * * *'   # 16:00 KST
    - cron: '0 9 * * *'   # 18:00 KST
    - cron: '0 11 * * *'  # 20:00 KST
    - cron: '0 13 * * *'  # 22:00 KST
  workflow_dispatch:

jobs:
  telegram-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run telegram alert
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p data logs
          python -u run_telegram_alert.py
