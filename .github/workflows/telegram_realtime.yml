name: Portfolio Agent Telegram Realtime Alert

on:
  schedule:
    # 평일(월~금) 오전 8시 ~ 오후 10시 KST, 2시간 간격
    # KST = UTC+9 이므로 UTC 기준: 23,1,3,5,7,9,11,13시 (전날 23시 = 당일 08시 KST)
    - cron: '0 23 * * 0-4'  # 08:00 KST (daily.yml 과 동시 — daily는 이메일+대시보드, 이건 텔레그램만)
    - cron: '0 1 * * 1-5'   # 10:00 KST
    - cron: '0 3 * * 1-5'   # 12:00 KST
    - cron: '0 5 * * 1-5'   # 14:00 KST
    - cron: '0 7 * * 1-5'   # 16:00 KST
    - cron: '0 9 * * 1-5'   # 18:00 KST
    - cron: '0 11 * * 1-5'  # 20:00 KST
    - cron: '0 13 * * 1-5'  # 22:00 KST
  workflow_dispatch:         # 수동 실행 버튼 (테스트용)

jobs:
  telegram-alert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run telegram alert
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          mkdir -p data logs
          python -u run_telegram_alert.py
